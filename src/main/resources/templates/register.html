<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | devNectar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f18;
            margin: 0;
            padding: 4rem 1.5rem;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        .register-container {
            width: 100%;
            max-width: 900px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 4.5rem;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .auth-header .brand {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1.5px;
        }

        .auth-header h2 {
            font-size: 2.25rem;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            margin-bottom: 0.75rem;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--brand-green);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-top: 4rem;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.3), transparent);
        }

        .role-selector {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.75rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .role-option { flex: 1; position: relative; }
        .role-option input { position: absolute; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }

        .role-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.75rem;
            text-align: center;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-secondary);
            font-weight: 700;
            border: 1px solid transparent;
            position: relative;
            z-index: 1;
        }

        .role-label i { font-size: 1.75rem; margin-bottom: 0.75rem; opacity: 0.5; transition: all 0.3s; }

        .role-option input:checked + .role-label {
            background: rgba(16, 185, 129, 0.1);
            color: var(--brand-green);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 4px 20px var(--brand-glow);
        }

        .role-option input:checked + .role-label i { opacity: 1; transform: translateY(-2px); }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }

        .form-group { margin-bottom: 0.5rem; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            margin-left: 0.25rem;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 16px !important;
            padding: 1rem 1.5rem !important;
            color: white !important;
            font-size: 1rem !important;
            transition: all 0.3s !important;
        }

        .form-control:focus {
            border-color: var(--brand-green) !important;
            background: rgba(0, 0, 0, 0.4) !important;
            box-shadow: 0 0 0 4px var(--brand-glow) !important;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, var(--brand-green) 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.15rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            box-shadow: 0 20px 40px var(--brand-glow);
        }

        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 30px 60px var(--brand-glow); filter: brightness(1.1); }

        .footer-text { text-align: center; margin-top: 3rem; color: var(--text-secondary); font-size: 1rem; }
        .footer-text a { color: var(--brand-green); text-decoration: none; font-weight: 800; margin-left: 0.5rem; }
        .footer-text a:hover { text-decoration: underline; color: white; }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .auth-card { padding: 2.5rem 1.5rem; border-radius: 24px; }
            .role-selector { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand">
                    <img th:src="@{/images/devNectar_logo.png}" alt="devNectar Logo" class="brand-logo" style="margin: 0 auto; height: 50px;">
                </div>
                <h2>Create Your Account</h2>
                <p>Join our professional developer network</p>
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post" enctype="multipart/form-data">
                
                <div class="section-title">Step 1: Choose Your Path</div>
                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" id="role-employee" name="roleName" value="ROLE_EMPLOYEE" checked onclick="toggleRoleFields('ROLE_EMPLOYEE')">
                        <label for="role-employee" class="role-label">
                            <i class="fas fa-briefcase"></i>
                            Staff Member
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="role-intern" name="roleName" value="ROLE_INTERN" onclick="toggleRoleFields('ROLE_INTERN')">
                        <label for="role-intern" class="role-label">
                            <i class="fas fa-user-graduate"></i>
                            Intern Program
                        </label>
                    </div>
                </div>

                <div class="section-title">Step 2: Account Security</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" th:field="*{fullName}" class="form-control" placeholder="e.g. Alexander Pierce" required>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" th:field="*{username}" class="form-control" placeholder="choose_username" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Email Address</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="work@company.com" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Password</label>
                        <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••••••" required>
                    </div>
                </div>

                <div id="employee-fields">
                    <div class="section-title">Step 3: Professional Profile</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Employee ID</label>
                            <input type="text" th:field="*{employeeExternalId}" class="form-control" placeholder="CN-2026-X">
                        </div>
                        <div class="form-group">
                            <label>Portfolio / LinkedIn</label>
                            <input type="url" th:field="*{portfolioUrl}" class="form-control" placeholder="https://linkedin.com/in/...">
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Technology Stack</label>
                            <input type="text" th:field="*{techStack}" class="form-control" placeholder="React, Java, Spring Boot, etc.">
                        </div>
                    </div>
                </div>

                <div id="intern-fields" class="hidden">
                    <div class="section-title">Step 3: Program Assignment</div>
                    <div class="form-group">
                        <label>Select Team Manager</label>
                        <select name="managerId" class="form-control">
                            <option value="">-- Choose Your Supervisor --</option>
                            <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.fullName}"></option>
                        </select>
                    </div>
                </div>

                <div class="section-title">Step 4: Identification</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Profile Photograph</label>
                        <input type="file" name="profileImage" class="form-control" accept="image/*" required>
                        <div style="font-size: 0.75rem; color: #64748b; margin-top: 0.5rem;">Formats: JPG, PNG (Max 2MB)</div>
                    </div>
                    <div class="form-group">
                        <label>Professional CV (PDF)</label>
                        <input type="file" name="resumeFile" class="form-control" accept=".pdf" required>
                        <div style="font-size: 0.75rem; color: #64748b; margin-top: 0.5rem;">Only PDF format allowed</div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    Complete Registration <i class="fas fa-rocket"></i>
                </button>
            </form>
            
            <div class="footer-text">
                Already have an account? <a th:href="@{/login}">Login instead</a>
            </div>
        </div>
    </div>

    <script>
        function toggleRoleFields(role) {
            const employeeFields = document.getElementById('employee-fields');
            const internFields = document.getElementById('intern-fields');
            
            if (role === 'ROLE_EMPLOYEE') {
                employeeFields.classList.remove('hidden');
                internFields.classList.add('hidden');
            } else {
                employeeFields.classList.add('hidden');
                internFields.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
