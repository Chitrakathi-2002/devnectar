<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Reports History | CloudNex Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .audit-nexus {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 3rem;
            margin-bottom: 3rem;
            box-shadow: var(--shadow-lg);
        }

        .status-badge-audit {
            padding: 0.65rem 1.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .audit-SUBMITTED { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.1); }
        .audit-APPROVED { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.1); }
        .audit-REVISION_REQUESTED { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.1); }

        .nexus-filter-input {
            background: rgba(0,0,0,0.03) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 14px !important;
            color: var(--text-primary) !important;
            padding: 1.15rem 1.5rem !important;
            font-weight: 600 !important;
            width: 100%;
        }

        .inspect-btn {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border: 1px solid rgba(59, 130, 246, 0.1);
            cursor: pointer;
        }

        .inspect-btn:hover { background: #3b82f6; color: white; transform: translateY(-3px); }

        /* IMPROVED: PREMIUM AUDIT DROPDOWN */
        .dropdown { position: relative; }

        .dropdown-menu-audit {
            display: none;
            position: absolute;
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 20px !important;
            padding: 0.75rem !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.05) !important;
            min-width: 240px !important;
            margin-top: 12px !important;
            z-index: 10000 !important;
            transform-origin: top right;
            animation: dropdownScale 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes dropdownScale {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .dropdown-menu-audit.show {
            display: block !important;
        }

        .dropdown-item-audit {
            padding: 0.85rem 1.25rem !important;
            font-size: 0.85rem !important;
            font-weight: 700 !important;
            border-radius: 14px !important;
            color: var(--text-secondary) !important;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
            background: transparent !important;
            border: none !important;
            width: 100% !important;
            margin-bottom: 4px !important;
            cursor: pointer !important;
            text-align: left !important;
        }

        .dropdown-item-audit:last-child { margin-bottom: 0 !important; }

        .dropdown-item-audit:hover {
            background: rgba(255, 255, 255, 0.05) !important;
            color: white !important;
            transform: translateX(4px);
        }

        .dropdown-item-audit i {
            width: 20px;
            text-align: center;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .dropdown-item-audit:hover i {
            transform: scale(1.1);
        }

        .label-micro {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            display: block;
        }

        .node-avatar-mini {
            width: 44px; height: 44px; border-radius: 14px;
            background: linear-gradient(135deg, var(--brand-green) 0%, #059669 100%);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: white;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('daily_reports')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/header :: header}" 
             th:with="pageTitle='Daily Reports History', pageSubtitle='View and manage all intern reports here.'"></div>

        <div class="dashboard-content">
            <!-- Filter Section -->
            <div class="audit-nexus">
                <div class="d-flex align-items-center gap-4 mb-5">
                    <div style="width: 48px; height: 48px; background: rgba(16, 185, 129, 0.1); color: var(--brand-green); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;">
                        <i class="fas fa-filter"></i>
                    </div>
                    <h3 style="font-weight: 800; letter-spacing: -0.01em; margin: 0;">Filter Reports</h3>
                </div>

                <!-- BREADCRUMB: Back to Staff Profile if filtered -->
                <div th:if="${selectedUserId != null}" class="mb-4 d-flex align-items-center gap-3" style="background: rgba(16, 185, 129, 0.05); padding: 1rem 1.5rem; border-radius: 14px; border: 1px dashed var(--brand-green);">
                    <div class="d-flex align-items-center gap-2" style="color: var(--brand-green); font-weight: 700;">
                        <i class="fas fa-user-tag"></i> Filtered by: <span th:text="${filteredUserName != null ? filteredUserName : 'Loading...'}">User Name</span>
                    </div>
                    <div style="width: 1px; height: 16px; background: var(--border-color);"></div>
                    <a th:href="@{/admin/staff/details/{id}(id=${selectedUserId})}" class="btn btn-ghost p-0" style="color: var(--text-secondary); font-size: 0.85rem; font-weight: 700; text-decoration: underline;">
                        <i class="fas fa-arrow-left me-1"></i> Back to Staff Profile
                    </a>
                </div>

                <form th:action="@{/admin/reports/all}" method="get" class="row g-4 align-items-end">
                    <input type="hidden" name="userId" th:value="${selectedUserId}">
                    <div class="col-md-8">
                        <label class="label-micro">Search by Manager Name</label>
                        <input type="text" name="manager" class="nexus-filter-input" placeholder="Type manager name here..." th:value="${param.manager}">
                    </div>
                    <div class="col-md-4 d-flex gap-3">
                        <button type="submit" class="btn btn-primary flex-grow-1" style="height: 56px;">SEARCH</button>
                        <a th:href="@{/admin/reports/all}" class="btn btn-ghost px-4 d-flex align-items-center justify-content-center" style="height: 56px; border: 1px solid var(--border-color); color: var(--text-secondary);">CLEAR</a>
                    </div>
                </form>
            </div>

            <div class="card p-0" style="padding: 0 !important; overflow: hidden; border: 1px solid var(--border-color); border-radius: 24px;">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr style="background: rgba(0,0,0,0.03);">
                                <th style="padding-left: 2.5rem;">Report Date</th>
                                <th>Intern Name</th>
                                <th>Reviewer</th>
                                <th>Status</th>
                                <th class="text-center">Details</th>
                                <th class="text-end" style="padding-right: 2.5rem;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="report : ${reports}">
                                <td style="padding-left: 2.5rem; font-weight: 800;" th:text="${#temporals.format(report.submissionDate, 'dd MMM yyyy')}">Date</td>
                                <td>
                                    <div class="d-flex align-items-center gap-4">
                                        <div class="node-avatar-mini" th:text="${#strings.substring(report.intern.fullName,0,1)}">I</div>
                                        <div class="d-flex flex-column">
                                            <span style="font-weight: 800; color: white; font-size: 1.1rem;" th:text="${report.intern.fullName}">Intern Name</span>
                                            <span style="font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600;">INTERN</span>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <div class="d-flex align-items-center gap-2" th:if="${report.manager != null}">
                                        <i class="fas fa-user-check text-primary opacity-50"></i>
                                        <span th:text="${report.manager.fullName}" style="font-weight: 700;">Manager</span>
                                    </div>
                                    <span th:if="${report.manager == null}" style="opacity: 0.3; font-style: italic;">NOT ASSIGNED</span>
                                </td>
                                <td>
                                    <div th:class="'status-badge-audit audit-' + ${report.status.name()}">
                                        <i th:class="${report.status.name() == 'APPROVED' ? 'fas fa-check-circle' : (report.status.name() == 'REVISION_REQUESTED' ? 'fas fa-exclamation-circle' : 'fas fa-clock')}"></i>
                                        <span th:text="${report.status}">SUBMITTED</span>
                                    </div>
                                </td>
                                <td class="text-center">
                                    <button class="inspect-btn mx-auto" 
                                            th:data-intern="${report.intern.fullName}"
                                            th:data-title="${report.title}"
                                            th:data-desc="${report.description}"
                                            th:data-manager="${report.manager != null ? report.manager.fullName : 'N/A'}"
                                            th:data-feedback="${report.managerFeedback}"
                                            onclick="viewAuditDetails(this)">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </td>
                                <td class="text-end" style="padding-right: 2.5rem;">
                                    <div class="dropdown">
                                        <button class="btn btn-primary btn-sm px-4" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="border-radius: 12px; font-weight: 800; height: 48px;">
                                            SELECT ACTION <i class="fas fa-chevron-down ms-2"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-audit dropdown-menu-end">
                                            <form th:action="@{/employee/report/action/{id}(id=${report.id})}" method="post" style="display: block; margin: 0;">
                                                <input type="hidden" name="action" value="APPROVE">
                                                <button type="submit" class="dropdown-item-audit">
                                                    <i class="fas fa-check-circle text-success"></i> Approve Now
                                                </button>
                                            </form>
                                            <button type="button" class="dropdown-item-audit" th:onclick="'openOverrideModal(' + ${report.id} + ', \'REVISION\')'">
                                                <i class="fas fa-redo text-warning"></i> Ask for Revision
                                            </button>
                                            <button type="button" class="dropdown-item-audit" th:onclick="'openOverrideModal(' + ${report.id} + ', \'CANCEL\')'">
                                                <i class="fas fa-times-circle text-danger"></i> Cancel Report
                                            </button>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals (Hidden by Default) -->
    <div id="auditModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 15000; align-items: center; justify-content: center; padding: 2rem;">
        <div class="card p-0" style="max-width: 800px; width: 100%; border: 1px solid var(--border-color); background: var(--bg-surface); border-radius: 40px; overflow: hidden;">
            <div class="p-5 d-flex align-items-center gap-4" style="background: rgba(0,0,0,0.05); border-bottom: 1px solid var(--border-color);">
                <div style="width: 56px; height: 56px; background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                    <i class="fas fa-file-alt"></i>
                </div>
                <div><h2 style="font-weight: 800; margin: 0; color: white;">Report Details</h2></div>
                <button onclick="closeModal('auditModal')" class="ms-auto btn" style="color: white; opacity: 0.5;"><i class="fas fa-times fa-lg"></i></button>
            </div>
            <div id="auditContent" class="p-5" style="color: white; line-height: 1.8;"></div>
            <div class="p-4 d-flex justify-content-end" style="background: rgba(0,0,0,0.05); border-top: 1px solid var(--border-color);"><button class="btn btn-ghost px-5" onclick="closeModal('auditModal')">CLOSE</button></div>
        </div>
    </div>

    <div id="overrideModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 15000; align-items: center; justify-content: center; padding: 2rem;">
        <div class="card p-5" style="max-width: 500px; width: 100%; background: var(--bg-surface); border-radius: 40px;">
            <div class="text-center mb-5">
                <div style="width: 80px; height: 80px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem;"><i class="fas fa-exclamation-triangle"></i></div>
                <h2 id="modalActionTitle" style="font-weight: 800; color: white;">Confirm Action</h2>
            </div>
            <form id="overrideForm" method="post">
                <input type="hidden" name="action" id="overrideAction">
                <div class="mb-5"><label class="label-micro">Your Reason (Required)</label><textarea name="feedback" required class="nexus-filter-input" style="min-height: 140px; resize: none;" placeholder="Type your reason here..."></textarea></div>
                <div class="d-flex gap-3"><button type="button" class="btn btn-ghost flex-grow-1" onclick="closeModal('overrideModal')">GOBACK</button><button type="submit" class="btn btn-danger flex-grow-1" style="font-weight: 800;">CONFIRM</button></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        function viewAuditDetails(btn) {
            const intern = btn.getAttribute('data-intern');
            const title = btn.getAttribute('data-title');
            const desc = btn.getAttribute('data-desc');
            const manager = btn.getAttribute('data-manager');
            const feedback = btn.getAttribute('data-feedback');
            document.getElementById('auditContent').innerHTML = `
                <div class="row g-4 mb-5"><div class="col-6"><div class="label-micro">INTERN</div><div style="font-weight: 800; color: white;">${intern}</div></div><div class="col-6"><div class="label-micro">REVIEWER</div><div style="font-weight: 800; color: white;">${manager}</div></div></div>
                <div class="mb-5"><div class="label-micro">REPORT TITLE</div><div style="font-weight: 800; font-size: 1.5rem; color: var(--brand-green);">${title}</div></div>
                <div class="mb-5"><div class="label-micro">WORK DONE</div><div style="background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 2.2rem; border-radius: 20px; color: var(--text-secondary); font-size: 1rem;">${desc}</div></div>
                ${feedback ? `<div style="margin-top: 2rem; padding: 1.5rem; background: rgba(16, 185, 129, 0.03); border-left: 4px solid var(--brand-green); border-radius: 12px;"><div class="label-micro" style="color: var(--brand-green);">MANAGER FEEDBACK</div><div style="color: white; font-weight: 600;">${feedback}</div></div>` : ''}
            `;
            document.getElementById('auditModal').style.display = 'flex';
        }
        function openOverrideModal(id, action) {
            document.getElementById('overrideForm').action = "/employee/report/action/" + id;
            document.getElementById('overrideAction').value = (action === 'REVISION') ? 'REVISION' : 'CANCEL';
            document.getElementById('modalActionTitle').innerText = (action === 'REVISION') ? 'Request Revision' : 'Cancel Report';
            document.getElementById('overrideModal').style.display = 'flex';
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onclick = function(event) { if (event.target.id === 'auditModal' || event.target.id === 'overrideModal') { event.target.style.display = 'none'; } }
    </script>
</body>
</html>
