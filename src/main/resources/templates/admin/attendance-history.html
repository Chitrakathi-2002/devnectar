<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
    (function() {
        const theme = localStorage.getItem('devnectar_theme') || 'light';
        const doc = document.documentElement;
        if (theme === 'dark') doc.classList.add('dark-theme');
        else doc.classList.add('light-theme');
        doc.classList.add('no-transitions');
        window.addEventListener('load', () => {
            setTimeout(() => { doc.classList.remove('no-transitions'); }, 100);
        });
    })();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Attendance | devNectar Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
    <style>
        .filter-nexus {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 2.5rem;
            margin-bottom: 3rem;
            box-shadow: var(--shadow-lg);
            position: relative;
            /* overflow: hidden; REMOVED to allow dropdown to show */
        }

        .choices {
            margin-bottom: 0;
            overflow: visible;
        }

        .choices__inner {
            background: rgba(0, 0, 0, 0.05) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 14px !important;
            color: var(--text-primary) !important;
            padding: 0.8rem 1.25rem !important;
            min-height: 56px !important;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        .choices__list--single {
            padding: 0 !important;
        }

        .choices__list--dropdown {
            background: var(--bg-surface) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 18px !important;
            backdrop-filter: blur(30px) !important;
            padding: 0.5rem !important;
            box-shadow: var(--shadow-xl) !important;
            z-index: 5000 !important;
            top: calc(100% + 10px) !important;
            animation: dropdownFade 0.2s ease-out;
        }

        @keyframes dropdownFade {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .choices__item--selectable {
            border-radius: 10px !important;
            padding: 0.85rem 1.25rem !important;
            font-weight: 600 !important;
            color: var(--text-secondary) !important;
            font-size: 0.9rem !important;
            transition: all 0.2s !important;
        }

        .choices__item--selectable.is-highlighted {
            background: var(--brand-green) !important;
            color: white !important;
        }

        /* Hide the default messy Choices.js arrows */
        .choices[data-type*="select-one"]::after {
            border: none !important;
            content: '\f078';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 0.8rem;
            color: var(--text-secondary);
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            margin: 0;
            transition: transform 0.3s;
        }

        .choices.is-open[data-type*="select-one"]::after {
            transform: translateY(-50%) rotate(180deg);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0.65rem 1.5rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .pill-PRESENT { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.1); }
        .pill-ABSENT { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.1); }

        .time-node {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.05);
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .time-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--brand-green);
            font-size: 0.9rem;
        }

        .label-micro {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.75rem;
            display: block;
        }

        /* Light theme specifics for dropdowns */
        .light-theme .choices__inner { background: rgba(0,0,0,0.03) !important; }
        .light-theme .choices__item--selectable { color: #334155 !important; }
        .light-theme .choices__item--selectable.is-highlighted { color: white !important; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('global_records')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/header :: header}" 
             th:with="pageTitle='Global Archive', pageSubtitle='Synchronized history of all system deployments and workforce cycles'"></div>

        <div class="dashboard-content">
            <!-- Filter Hub -->
            <div class="filter-nexus">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div class="d-flex align-items-center gap-4">
                        <div style="width: 48px; height: 48px; background: rgba(16, 185, 129, 0.1); color: var(--brand-green); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;">
                            <i class="fas fa-filter"></i>
                        </div>
                        <h3 style="font-weight: 800; letter-spacing: -0.01em; margin: 0;">Parameter Optimization</h3>
                    </div>
                    <div class="d-flex gap-3">
                        <a th:href="@{/admin/attendance/export/excel(userId=${selectedUserId}, month=${selectedMonth}, year=${selectedYear})}" class="btn btn-primary">
                            <i class="fas fa-file-excel"></i> EXCEL DISPATCH
                        </a>
                        <a th:href="@{/admin/attendance/export/pdf(userId=${selectedUserId}, month=${selectedMonth}, year=${selectedYear})}" class="btn btn-primary">
                            <i class="fas fa-file-pdf"></i> PDF EXPORT
                        </a>
                    </div>
                </div>

                <!-- BREADCRUMB: Back to Staff Profile if filtered -->
                <div th:if="${selectedUserId != null}" class="mb-5 d-flex align-items-center gap-3" style="background: rgba(16, 185, 129, 0.05); padding: 1.25rem 2rem; border-radius: 18px; border: 1px dashed var(--brand-green);">
                    <div class="d-flex align-items-center gap-2" style="color: var(--brand-green); font-weight: 700;">
                        <i class="fas fa-user-tag"></i> Audit Mode: <span th:text="${filteredUserName != null ? filteredUserName : 'Loading...'}">User Name</span>
                    </div>
                    <div style="width: 1px; height: 16px; background: var(--border-color);"></div>
                    <a th:href="@{/admin/staff/details/{id}(id=${selectedUserId})}" class="btn btn-ghost p-0" style="color: var(--text-secondary); font-size: 0.85rem; font-weight: 700; text-decoration: underline;">
                        <i class="fas fa-arrow-left me-1"></i> Back to Staff Profile
                    </a>
                </div>

                <form th:action="@{/admin/attendance/all}" method="get" class="row g-4 align-items-end" style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                    <div style="flex: 2; min-width: 250px;">
                        <label class="label-micro">Node Selection (Staff)</label>
                        <select name="userId" id="userSelect">
                            <option value="">Show All Nodes</option>
                            <option th:each="u : ${users}" 
                                    th:value="${u.id}" 
                                    th:text="${u.fullName}"
                                    th:selected="${u.id == selectedUserId}"></option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <label class="label-micro">Temporal Cycle (Month)</label>
                        <select name="month" id="monthSelect">
                            <option th:each="m : ${#numbers.sequence(1, 12)}" 
                                    th:value="${m}" 
                                    th:text="${T(java.time.Month).of(m).name()}"
                                    th:selected="${m == selectedMonth}"></option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <label class="label-micro">Temporal Phase (Year)</label>
                        <select name="year" id="yearSelect">
                            <option th:each="y : ${#numbers.sequence(2024, 2030)}" 
                                    th:value="${y}" 
                                    th:text="${y}"
                                    th:selected="${y == selectedYear}"></option>
                        </select>
                    </div>
                    <div style="flex: 0 0 200px;">
                        <button type="submit" class="btn btn-primary w-100">
                             SYNC FILTERS
                        </button>
                    </div>
                </form>
            </div>

            <div class="card p-0" style="padding: 0 !important; overflow: hidden;">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Identity Node</th>
                                <th>Security Role</th>
                                <th>Cycle Date</th>
                                <th>Verification</th>
                                <th>Timing Analysis (In - Out)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="record : ${allAttendance}">
                                <td>
                                    <div class="d-flex flex-column gap-1">
                                        <span class="fw-bold" style="color: var(--text-primary); font-size: 0.95rem;" th:text="${record.user.fullName}">Full Name</span>
                                        <span style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase;" th:text="${record.user.username}">Username</span>
                                    </div>
                                </td>
                                <td>
                                    <div class="d-flex gap-2 flex-wrap">
                                        <span th:each="role : ${record.user.roles}" 
                                              th:text="${#strings.replace(role.name, 'ROLE_', '')}" 
                                              class="badge badge-primary">ROLE</span>
                                    </div>
                                </td>
                                <td style="font-weight: 600; color: var(--text-primary);" th:text="${#temporals.format(record.date, 'dd MMM yyyy')}">Date</td>
                                <td>
                                    <div th:class="'status-pill pill-' + ${record.status.name()}">
                                        <i th:class="${record.status.name() == 'PRESENT' ? 'fas fa-shield-check' : 'fas fa-shield-slash'}"></i>
                                        <span th:text="${record.status}">PRESENT</span>
                                    </div>
                                </td>
                                <td>
                                    <div class="time-node">
                                        <div class="time-value" th:text="${record.checkInTime != null ? record.checkInTime : '--:--:--'}">09:00</div>
                                        <div style="width: 15px; height: 1px; background: rgba(0,0,0,0.1);"></div>
                                        <div class="time-value" th:text="${record.checkOutTime != null ? record.checkOutTime : '--:--:--'}">18:00</div>
                                        <i th:if="${record.modifiedByAdmin}" class="fas fa-user-edit text-warning ms-2" style="font-size: 0.8rem;" title="Manual Override Detected"></i>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(allAttendance)}">
                                <td colspan="5" class="text-center py-5" style="color: var(--text-secondary);">
                                    <i class="fas fa-box-open mb-4" style="font-size: 3rem; opacity: 0.1; display: block;"></i>
                                    No node activity matches the specified temporal parameters.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const choicesOptions = {
                searchEnabled: true,
                itemSelectText: '',
                removeItemButton: false,
                placeholder: true,
                shouldSort: false,
                classNames: {
                    containerInner: 'choices__inner',
                    listDropdown: 'choices__list--dropdown',
                }
            };

            new Choices('#userSelect', {
                ...choicesOptions,
                placeholderValue: 'Search staff node...'
            });

            new Choices('#monthSelect', { ...choicesOptions, searchEnabled: false });
            new Choices('#yearSelect', { ...choicesOptions, searchEnabled: false });
        });
    </script>
    
</body>
</html>
