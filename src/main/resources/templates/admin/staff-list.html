<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
    (function() {
        const theme = localStorage.getItem('devnectar_theme') || 'light';
        const doc = document.documentElement;
        if (theme === 'dark') doc.classList.add('dark-theme');
        else doc.classList.add('light-theme');
        doc.classList.add('no-transitions');
        window.addEventListener('load', () => {
            setTimeout(() => { doc.classList.remove('no-transitions'); }, 100);
        });
    })();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management | devNectar Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .staff-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .search-area {
            background: rgba(0,0,0,0.05);
            padding: 2rem 2.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .search-input-group {
            position: relative;
            max-width: 500px;
        }

        .search-input-group i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-field {
            width: 100%;
            background: rgba(0,0,0,0.05) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 14px !important;
            padding: 0.85rem 1.25rem 0.85rem 3rem !important;
            color: var(--text-primary) !important;
            font-weight: 500;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-active { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.1); }
        .status-inactive { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.1); }

        .staff-row {
            cursor: pointer;
            transition: all 0.2s;
        }

        .staff-row:hover {
            background: rgba(255, 255, 255, 0.02) !important;
        }

        .role-pill {
            padding: 0.4rem 0.85rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .avatar-node {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand-green) 0%, #059669 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('staff_management')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/header :: header}" 
             th:with="pageTitle='Staff Management', pageSubtitle='Manage workforce access and profiles.'"></div>

        <div class="dashboard-content">
            <div class="staff-card">
                <div class="search-area d-flex justify-content-between align-items-center">
                    <form th:action="@{/admin/staff}" method="get" class="search-input-group">
                        <i class="fas fa-search"></i>
                        <input type="text" name="search" class="search-field" placeholder="Search by name..." th:value="${param.search}">
                    </form>
                    <div class="d-flex gap-3">
                        <span class="text-secondary" style="font-size: 0.85rem; font-weight: 600;">
                            Total Records: <span style="color: var(--text-primary);" th:text="${staff.size()}">0</span>
                        </span>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="padding-left: 2.5rem;">Identity Node</th>
                                <th>Full Name</th>
                                <th>Role</th>
                                <th>Email</th>
                                <th>Account Status</th>
                                <th class="text-end" style="padding-right: 2.5rem;">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="member : ${staff}" class="staff-row" th:onclick="'window.location.href=\'/admin/staff/details/' + ${member.id} + '\''">
                                <td style="padding-left: 2.5rem;">
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="avatar-node" th:text="${member.id}">0</div>
                                        <span style="font-family: monospace; opacity: 0.7;" th:text="${'#CNX-' + member.id}">#CNX-0</span>
                                    </div>
                                </td>
                                <td>
                                    <div style="font-weight: 700; color: var(--text-primary);" th:text="${member.fullName}">Full Name</div>
                                </td>
                                <td>
                                    <span class="role-pill" th:each="role : ${member.roles}" th:text="${#strings.replace(role.name, 'ROLE_', '')}">ROLE</span>
                                </td>
                                <td th:text="${member.email}">email@example.com</td>
                                <td>
                                    <span th:if="${member.isEnabled}" class="status-badge status-active">
                                        <i class="fas fa-check-circle"></i> Active
                                    </span>
                                    <span th:if="${!member.isEnabled}" class="status-badge status-inactive">
                                        <i class="fas fa-times-circle"></i> Inactive
                                    </span>
                                </td>
                                <td class="text-end" style="padding-right: 2.5rem;">
                                    <a th:href="@{/admin/staff/details/{id}(id=${member.id})}" class="btn btn-ghost btn-sm">
                                        MANAGE <i class="fas fa-chevron-right ms-1"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${staff.empty}">
                                <td colspan="6" class="text-center" style="padding: 4rem; opacity: 0.5;">
                                    <i class="fas fa-users-slash fa-3x mb-3 d-block"></i>
                                    No staff records found.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
