<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Action Center | CloudNex</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .action-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: var(--shadow-md);
        }

        .action-dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-menu-glass {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 0.5rem;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
        }

        .dropdown-item-glass {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.85rem 1.25rem;
            border-radius: 10px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .dropdown-item-glass:hover {
            background: rgba(255, 255, 255, 0.03);
            color: white;
        }

        .item-approve:hover { color: var(--brand-green) !important; background: rgba(16, 185, 129, 0.05) !important; }
        .item-revision:hover { color: var(--accent) !important; background: rgba(245, 158, 11, 0.05) !important; }
        .item-reject:hover { color: var(--danger) !important; background: rgba(239, 68, 68, 0.05) !important; }
        
        .review-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .review-btn:hover {
            background: var(--brand-green);
            color: white;
            border-color: var(--brand-green);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--brand-glow);
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('approvals')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/header :: header}" 
             th:with="pageTitle='Report Action Center', pageSubtitle='Review and authorize intern daily contributions'"></div>

        <div class="dashboard-content">
            <div class="action-card">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <h2 style="font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em;">Pending Authorizations</h2>
                    <div class="badge badge-warning" th:if="${not #lists.isEmpty(pendingReports)}" th:text="${pendingReports.size() + ' Action Required'}">0 Action Required</div>
                </div>

                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Intern</th>
                                <th>Date</th>
                                <th>Report Title</th>
                                <th>Intensity</th>
                                <th class="text-center">Review</th>
                                <th class="text-end">Dispatch Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="report : ${pendingReports}">
                                <td style="font-weight: 700;" th:text="${report.intern.fullName}">Intern Name</td>
                                <td th:text="${report.submissionDate}">22-03-2026</td>
                                <td th:text="${report.title}">Title</td>
                                <td><span class="badge" style="background: rgba(99, 102, 241, 0.1); color: #6366f1;" th:text="${report.hours + ' hrs'}">8.0 hrs</span></td>
                                <td class="text-center">
                                    <button class="review-btn" 
                                            th:data-intern="${report.intern.fullName}"
                                            th:data-title="${report.title}"
                                            th:data-desc="${report.description}"
                                            th:data-hours="${report.hours}"
                                            th:data-date="${report.submissionDate}"
                                            onclick="openReviewModal(this)" 
                                            data-bs-toggle="modal" data-bs-target="#reviewModal">
                                        <i class="fas fa-microscope"></i>
                                    </button>
                                </td>
                                <td class="text-end">
                                    <div class="action-dropdown dropdown">
                                        <button class="btn btn-primary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                            Execute <i class="fas fa-chevron-down ms-2"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-glass dropdown-menu-end">
                                            <form th:action="@{/employee/report/action/{id}(id=${report.id})}" method="post">
                                                <input type="hidden" name="action" value="APPROVE">
                                                <button type="submit" class="dropdown-item dropdown-item-glass item-approve">
                                                    <i class="fas fa-check-circle"></i> Approve Access
                                                </button>
                                            </form>
                                            <button class="dropdown-item dropdown-item-glass item-revision" th:onclick="'openFeedbackModal(' + ${report.id} + ', \'REVISION\')'" data-bs-toggle="modal" data-bs-target="#feedbackModal">
                                                <i class="fas fa-redo"></i> Request Revision
                                            </button>
                                            <button class="dropdown-item dropdown-item-glass item-reject" th:onclick="'openFeedbackModal(' + ${report.id} + ', \'CANCEL\')'" data-bs-toggle="modal" data-bs-target="#feedbackModal">
                                                <i class="fas fa-ban"></i> Void Entry
                                            </button>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(pendingReports)}">
                                <td colspan="6" class="text-center py-5" style="color: var(--text-secondary);">
                                    <i class="fas fa-shield-check mb-4" style="font-size: 2.5rem; opacity: 0.1; display: block;"></i>
                                    All reports have been successfully cleared.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 28px; backdrop-filter: blur(20px);">
                <div class="modal-header border-bottom border-secondary p-4">
                    <h5 class="modal-title" style="font-weight: 800;">Review Work Submission</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="reviewModalBody"></div>
                <div class="modal-footer border-top border-secondary p-4">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close Review</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div class="modal fade" id="feedbackModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 28px; backdrop-filter: blur(20px);">
                <div class="modal-header border-bottom border-secondary p-4">
                    <h5 class="modal-title" id="feedbackModalTitle" style="font-weight: 800;">Feedback</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="feedbackForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="modal-body p-4">
                        <input type="hidden" name="action" id="feedbackAction">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold mb-3 uppercase letter-spacing-1">Resource Feedback (Required)</label>
                            <textarea class="form-control" name="feedback" id="feedbackText" rows="4" required 
                                      placeholder="Provide detailed reasons for your decision..."
                                      style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 14px; padding: 1rem;"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer border-top border-secondary p-4">
                        <button type="button" class="btn" style="background: rgba(255,255,255,0.05);" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn" id="feedbackSubmitBtn">Execute Dispatch</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        function openReviewModal(btn) {
            const intern = btn.getAttribute('data-intern');
            const title = btn.getAttribute('data-title');
            const desc = btn.getAttribute('data-desc');
            const hours = btn.getAttribute('data-hours');
            const date = btn.getAttribute('data-date');

            document.getElementById('reviewModalBody').innerHTML = `
                <div class="container-fluid py-2">
                    <div class="row mb-5">
                        <div class="col-md-6 mb-3">
                            <div class="small text-secondary fw-bold mb-2 text-uppercase letter-spacing-1">CONTRIBUTOR</div>
                            <div class="fw-bold fs-5" style="color: var(--brand-green);">${intern}</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="small text-secondary fw-bold mb-2 text-uppercase letter-spacing-1">SUBMISSION TIMESTAMP</div>
                            <div class="fw-bold fs-5">${date}</div>
                        </div>
                    </div>
                    <div class="mb-5">
                        <div class="small text-secondary fw-bold mb-2 text-uppercase letter-spacing-1">NODE TITLE</div>
                        <div class="fw-bold fs-4" style="letter-spacing: -0.02em;">${title}</div>
                    </div>
                    <div class="mb-5">
                        <div class="small text-secondary fw-bold mb-2 text-uppercase letter-spacing-1">LOG ENTRY</div>
                        <div class="p-4 rounded-4" style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); white-space: pre-wrap; line-height: 1.6;">${desc}</div>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <span class="badge" style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 0.75rem 1.25rem;">Intensity: ${hours} Hours</span>
                        <span class="badge badge-primary" style="padding: 0.75rem 1.25rem;">Node ID: #REP-${Math.floor(Math.random()*10000)}</span>
                    </div>
                </div>
            `;
        }

        function openFeedbackModal(id, action) {
            const form = document.getElementById('feedbackForm');
            const title = document.getElementById('feedbackModalTitle');
            const btn = document.getElementById('feedbackSubmitBtn');
            
            form.action = "/employee/report/action/" + id;
            document.getElementById('feedbackAction').value = action;
            document.getElementById('feedbackText').value = '';
            
            if (action === 'REVISION') {
                title.innerText = "Request Node Revision";
                btn.className = "btn btn-primary px-4";
                btn.innerText = "Dispatch Revision";
            } else {
                title.innerText = "Void Report Entry";
                btn.className = "btn btn-danger px-4";
                btn.innerText = "Execute Void";
            }
        }
    </script>
</body>
</html>
