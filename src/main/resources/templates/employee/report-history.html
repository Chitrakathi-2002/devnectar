<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
    (function() {
        const theme = localStorage.getItem('devnectar_theme') || 'light';
        const doc = document.documentElement;
        if (theme === 'dark') doc.classList.add('dark-theme');
        else doc.classList.add('light-theme');
        doc.classList.add('no-transitions');
        window.addEventListener('load', () => {
            setTimeout(() => { doc.classList.remove('no-transitions'); }, 100);
        });
    })();
</script>
    <meta charset="UTF-8">
    <title>Report History | devNectar</title>
    <link rel="icon" type="image/png" th:href="@{/images/dev.png}">
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .history-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: var(--shadow-md);
        }

        .view-btn {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .view-btn:hover {
            background: #10b981;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('reports')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/header :: header}" 
             th:with="pageTitle='Report History', pageSubtitle='Archive of validated team contributions'"></div>

        <div class="dashboard-content">
            <div class="history-card">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <h2 style="font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em;">Validated Records</h2>
                    <div class="badge badge-success" th:text="${approvedReports.size() + ' Total Entries'}">0 Entries</div>
                </div>

                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Contributor</th>
                                <th>Dispatch Date</th>
                                <th>Node Identifier</th>
                                <th>Resource Load</th>
                                <th>Status</th>
                                <th class="text-center">Details</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="report : ${approvedReports}">
                                <td style="font-weight: 700;" th:text="${report.intern.fullName}">Intern Name</td>
                                <td th:text="${report.submissionDate}">22-03-2026</td>
                                <td th:text="${report.title}">Title</td>
                                <td><span class="badge" style="background: rgba(99, 102, 241, 0.1); color: #6366f1;" th:text="${report.hours + ' hrs'}">8.0 hrs</span></td>
                                <td>
                                    <span class="badge badge-success">VALIDATED</span>
                                </td>
                                <td class="text-center">
                                    <button class="view-btn" 
                                            th:data-intern="${report.intern.fullName}"
                                            th:data-title="${report.title}"
                                            th:data-desc="${report.description}"
                                            th:data-hours="${report.hours}"
                                            th:data-date="${report.submissionDate}"
                                            th:data-feedback="${report.managerFeedback}"
                                            onclick="openViewModal(this)" 
                                            data-bs-toggle="modal" data-bs-target="#viewModal">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(approvedReports)}">
                                <td colspan="6" class="text-center py-5" style="color: var(--text-secondary);">
                                    <i class="fas fa-archive mb-4" style="font-size: 2.5rem; opacity: 0.1; display: block;"></i>
                                    No records found in the validation archive.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- View Modal -->
    <div class="modal fade" id="viewModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 28px; backdrop-filter: blur(20px);">
                <div class="modal-header border-bottom border-secondary p-4">
                    <h5 class="modal-title" style="font-weight: 800;">Node Inspection</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="viewModalBody"></div>
                <div class="modal-footer border-top border-secondary p-4">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close Archive</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        function openViewModal(btn) {
            const intern = btn.getAttribute('data-intern');
            const title = btn.getAttribute('data-title');
            const desc = btn.getAttribute('data-desc');
            const hours = btn.getAttribute('data-hours');
            const date = btn.getAttribute('data-date');
            const feedback = btn.getAttribute('data-feedback');

            document.getElementById('viewModalBody').innerHTML = `
                <div class="container-fluid py-2">
                    <div class="row mb-5">
                        <div class="col-md-6 mb-3">
                            <div class="small text-secondary fw-bold mb-2 text-uppercase letter-spacing-1">CONTRIBUTOR</div>
                            <div class="fw-bold fs-5" style="color: var(--brand-green);">${intern}</div>
                        </div>
                        <div class="col-md-6 mb-3 text-end">
                            <div class="small text-secondary fw-bold mb-2 text-uppercase letter-spacing-1">STATUS</div>
                            <div class="badge badge-success px-3 py-2">VALIDATED</div>
                        </div>
                    </div>
                    <div class="mb-5">
                        <div class="small text-secondary fw-bold mb-2 text-uppercase letter-spacing-1">NODE TITLE</div>
                        <div class="fw-bold fs-4" style="letter-spacing: -0.02em;">${title}</div>
                    </div>
                    <div class="mb-5">
                        <div class="small text-secondary fw-bold mb-2 text-uppercase letter-spacing-1">LOG ENTRY</div>
                        <div class="p-4 rounded-4" style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); white-space: pre-wrap; line-height: 1.6;">${desc}</div>
                    </div>
                    <div class="row mb-5">
                        <div class="col-6">
                            <div class="small text-secondary fw-bold mb-1 text-uppercase letter-spacing-1">LOAD</div>
                            <div class="fw-bold">${hours} Hours</div>
                        </div>
                        <div class="col-6">
                            <div class="small text-secondary fw-bold mb-1 text-uppercase letter-spacing-1">TIMESTAMP</div>
                            <div class="fw-bold">${date}</div>
                        </div>
                    </div>
                    ${feedback ? `
                        <div class="mt-4">
                            <div class="small text-secondary fw-bold mb-2 text-uppercase letter-spacing-1">VALIDATION FEEDBACK</div>
                            <div class="p-4 rounded-4" style="background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.1); color: #10b981;">${feedback}</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }
    </script>
    
</body>
</html>
