<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
    (function() {
        const theme = localStorage.getItem('devnectar_theme') || 'light';
        const doc = document.documentElement;
        if (theme === 'dark') doc.classList.add('dark-theme');
        else doc.classList.add('light-theme');
        doc.classList.add('no-transitions');
        window.addEventListener('load', () => {
            setTimeout(() => { doc.classList.remove('no-transitions'); }, 100);
        });
    })();
</script>
    <meta charset="UTF-8">
    <title>Employee Dashboard | devNectar</title>
    <link rel="icon" type="image/png" th:href="@{/images/dev.png}">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/header :: header}" 
             th:with="pageTitle='Employee Portal', pageSubtitle='Team management and progress tracking'"></div>

        <div class="dashboard-content">
            <div class="card-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;"><i class="fas fa-users"></i></div>
                    <div>
                        <div class="stat-label">My Team</div>
                        <div class="stat-value" th:text="${teamCount}">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;"><i class="fas fa-file-alt"></i></div>
                    <div>
                        <div class="stat-label">Pending Approval</div>
                        <div class="stat-value" th:text="${pendingApprovals}">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;"><i class="fas fa-calendar-check"></i></div>
                    <div>
                        <div class="stat-label">Monthly Rate</div>
                        <div class="stat-value" th:text="${monthlyRate + '%'}">0%</div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 2.5rem;">
                <div class="card" style="border-left: 4px solid var(--accent);">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h3 style="font-size: 1rem; font-weight: 700; margin: 0;">Today's Session Status</h3>
                            <p style="color: var(--text-secondary); font-size: 0.85rem; margin: 0.25rem 0 0 0;" 
                               th:text="${todayAttendance != null ? 'Active since ' + todayAttendance.checkInTime : 'Session not yet initialized for today'}">Status text</p>
                        </div>
                        <span th:if="${todayAttendance != null}" class="badge badge-success">ACTIVE</span>
                        <span th:if="${todayAttendance == null}" class="badge" style="background: rgba(255,255,255,0.05); color: var(--text-secondary);">INACTIVE</span>
                    </div>
                </div>
            </div>

            <div style="margin-top: 2.5rem;">
                <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem;">Recent Activities</h2>
                <div class="card">
                    <p style="color: var(--text-secondary);">Welcome to your management portal. You can oversee team progress and approve intern reports from the sidebar.</p>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
