<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
    (function() {
        const theme = localStorage.getItem('devnectar_theme') || 'light';
        const doc = document.documentElement;
        if (theme === 'dark') doc.classList.add('dark-theme');
        else doc.classList.add('light-theme');
        doc.classList.add('no-transitions');
        window.addEventListener('load', () => {
            setTimeout(() => { doc.classList.remove('no-transitions'); }, 100);
        });
    })();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devNectar | Staff Management</title>
    <!-- React Core Injector styles generated by Vite -->
    <link rel="stylesheet" th:href="@{/css/react-app.css}">
    <!-- Additional Google Fonts for Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white antialiased">
    <!-- React Architecture Root Mount -->
    <div id="root"></div>

    <!-- Vite Bundled Javascript Module -->
    <!-- Important: The browser needs to natively run the compiled JS -->
    <script type="module" th:src="@{/js/react-app.js}"></script>
    
    <!-- Fallback if token is available in Thymeleaf context, you could inject it -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        // Optional Backend-Frontend Bridge placeholder
        window.CSRF_TOKEN = /*[[${_csrf?.token}]]*/ null;
        /*]]>*/
    </script>
    <script th:src='@{/js/theme-toggle.js}'></script>
</body>
</html>
