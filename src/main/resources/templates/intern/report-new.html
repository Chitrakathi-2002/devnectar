<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
    (function() {
        const theme = localStorage.getItem('devnectar_theme') || 'light';
        const doc = document.documentElement;
        if (theme === 'dark') doc.classList.add('dark-theme');
        else doc.classList.add('light-theme');
        doc.classList.add('no-transitions');
        window.addEventListener('load', () => {
            setTimeout(() => { doc.classList.remove('no-transitions'); }, 100);
        });
    })();
</script>
    <meta charset="UTF-8">
    <title>New Daily Report | devNectar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        :root {
            --brand-green: #2ecc71;
            --brand-dark: #2c3e50;
        }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; }
        .report-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 2.5rem;
            max-width: 800px;
            margin: 2rem auto;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="report-card">
            <h2 class="text-center mb-4" style="color: var(--brand-dark);">Daily Work Submission</h2>
            <form th:action="@{/intern/report/submit}" method="post">
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Work Title</label>
                    <input type="text" name="title" class="form-control" placeholder="Brief summary of tasks (e.g., Bug fixing in API)" required>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label font-weight-bold">Date</label>
                        <input type="date" class="form-control" th:value="${T(java.time.LocalDate).now()}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label font-weight-bold">Hours Worked</label>
                        <input type="number" step="0.5" name="hours" class="form-control" placeholder="e.g., 8.0" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label font-weight-bold">Detailed Description</label>
                    <textarea name="description" class="form-control" rows="8" placeholder="List all tasks completed today with details..." required></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success" style="background: var(--brand-green); border: none; padding: 0.8rem; font-weight: 600;">Submit Work Report</button>
                    <a th:href="@{/intern/dashboard}" class="btn btn-outline-secondary">Go Back to Dashboard</a>
                </div>
            </form>
        </div>
    </div>
    <script th:src='@{/js/theme-toggle.js}'></script>
</body>
</html>
