<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Reports | CloudNex</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .report-status-pending { color: #f1c40f; }
        .report-status-approved { color: #2ecc71; }
        .report-status-revision { color: #e67e22; }
        .report-status-cancelled { color: #e74c3c; }
        
        .feedback-note {
            font-size: 0.8rem;
            background: rgba(230, 126, 34, 0.1);
            border-left: 3px solid #e67e22;
            padding: 0.5rem;
            margin-top: 0.5rem;
            border-radius: 4px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--bg-card);
            margin: 10% auto;
            padding: 2rem;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 600px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
        }
        .form-control:focus { outline: none; border-color: var(--brand-green); }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('reports')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/header :: header}" 
             th:with="pageTitle='Daily Work Reports', pageSubtitle='Submit and track your daily progress logs'"></div>

        <div class="dashboard-content">
            <!-- Daily Report Action Card (Image 2) -->
            <div class="card mb-4" style="max-width: 500px; background: linear-gradient(135deg, rgba(31, 41, 55, 0.9) 0%, rgba(17, 24, 39, 0.9) 100%);">
                <div class="p-4">
                    <h3 style="font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem;">Daily Report</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.95rem;">Don't forget to submit your report for today's work.</p>
                    <button class="btn btn-primary w-100" onclick="openModal('newReportModal')" style="padding: 0.8rem; background: #10b981; border: none; font-weight: 600; font-size: 1rem;">
                        <i class="fas fa-plus me-2"></i> Work Portal
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 style="font-size: 1.25rem; font-weight: 700;">Recent Daily Reports</h2>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>DATE</th>
                                <th>TITLE</th>
                                <th>STATUS</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="report : ${reports}" th:onclick="|viewDetails('${report.description}')|" style="cursor: pointer;">
                                <td th:text="${report.submissionDate}" style="font-weight: 600; text-transform: uppercase; font-size: 0.85rem;">Date</td>
                                <td>
                                    <div th:text="${report.title}" style="font-weight: 500;">Title</div>
                                    <div th:if="${report.managerFeedback}" class="feedback-note" 
                                         th:onclick="|event.stopPropagation();|"
                                         th:title="'Manager Feedback: ' + ${report.managerFeedback}">
                                        <i class="fas fa-comment-dots me-1"></i> 
                                        <span th:text="${#strings.abbreviate(report.managerFeedback, 50)}">Feedback</span>
                                    </div>
                                </td>
                                <td>
                                    <span th:class="'badge ' + ${report.status.name() == 'APPROVED' ? 'badge-success' : (report.status.name() == 'REVISION_REQUESTED' ? 'badge-warning' : (report.status.name() == 'CANCELLED' ? 'badge-danger' : 'badge-info'))}"
                                          th:text="${report.status}">SUBMITTED</span>
                                </td>
                                <td>
                                    <div class="d-flex gap-2">
                                        <button th:if="${report.status.name() == 'REVISION_REQUESTED'}" 
                                                class="btn btn-sm" style="background: rgba(16, 185, 129, 0.1); color: #10b981;"
                                                th:onclick="|event.stopPropagation(); openEditModal(${report.id}, '${report.title}', '${report.description}', ${report.hours})|">
                                            <i class="fas fa-edit"></i> Edit
                                        </button>
                                        <button class="btn btn-sm" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;"
                                                th:onclick="|event.stopPropagation(); viewDetails('${report.description}')|">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(reports)}">
                                <td colspan="4" class="text-center py-5" style="color: var(--text-secondary);">
                                    <div style="font-size: 1.1rem; opacity: 0.5;">No reports submitted yet.</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- New Report Modal -->
    <div id="newReportModal" class="modal">
        <div class="modal-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 style="font-size: 1.2rem; font-weight: 700;">Submit Daily Report</h3>
                <button class="btn btn-sm" onclick="closeModal('newReportModal')"><i class="fas fa-times"></i></button>
            </div>
            <form th:action="@{/intern/reports/submit}" method="post">
                <div class="form-group">
                    <label>Report Title</label>
                    <input type="text" name="title" class="form-control" placeholder="e.g. Feature Implementation - Login Module" required>
                </div>
                <div class="form-group">
                    <label>Work Description</label>
                    <textarea name="description" class="form-control" rows="4" placeholder="Describe your daily progress..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Effort (Hours)</label>
                    <input type="number" step="0.5" name="hours" class="form-control" value="8.0" required>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn" style="background: rgba(255,255,255,0.05);" onclick="closeModal('newReportModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit Report</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Report Modal -->
    <div id="editReportModal" class="modal">
        <div class="modal-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 style="font-size: 1.2rem; font-weight: 700;">Edit & Resubmit Report</h3>
                <button class="btn btn-sm" onclick="closeModal('editReportModal')"><i class="fas fa-times"></i></button>
            </div>
            <form id="editForm" method="post">
                <div class="form-group">
                    <label>Report Title</label>
                    <input type="text" id="editTitle" name="title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Work Description</label>
                    <textarea id="editDescription" name="description" class="form-control" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Effort (Hours)</label>
                    <input type="number" step="0.5" id="editHours" name="hours" class="form-control" required>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn" style="background: rgba(255,255,255,0.05);" onclick="closeModal('editReportModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Resubmit</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        function openModal(id) {
            document.getElementById(id).style.display = 'block';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function openEditModal(id, title, desc, hours) {
            document.getElementById('editForm').action = '/intern/reports/update/' + id;
            document.getElementById('editTitle').value = title;
            document.getElementById('editDescription').value = desc;
            document.getElementById('editHours').value = hours;
            openModal('editReportModal');
        }

        function viewDetails(desc) {
            Swal.fire({
                title: 'Work Description',
                text: desc,
                background: 'var(--bg-card)',
                color: 'var(--text-primary)',
                confirmButtonColor: 'var(--brand-green)'
            });
        }

        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
