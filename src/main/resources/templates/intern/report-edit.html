<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Report | CloudNex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        :root {
            --brand-green: #2ecc71;
            --brand-dark: #2c3e50;
        }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; }
        .edit-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 2.5rem;
            max-width: 800px;
            margin: 2rem auto;
        }
        .feedback-alert {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            color: #856404;
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="edit-card">
        <h2 class="mb-4">Fix & Resubmit Report</h2>
        
        <div class="feedback-alert" th:if="${report.managerFeedback}">
            <strong>Manager Feedback:</strong>
            <p class="mb-0" th:text="${report.managerFeedback}"></p>
        </div>

        <form th:action="@{/intern/report/update/{id}(id=${report.id})}" th:object="${report}" method="post">
            <div class="mb-4">
                <label for="title" class="form-label">Work Title</label>
                <input type="text" class="form-control" id="title" name="title" th:value="${report.title}" required>
            </div>

            <div class="mb-4">
                <label for="hours" class="form-label">Hours Worked</label>
                <input type="number" step="0.5" class="form-control" id="hours" name="hours" th:value="${report.hours}" required>
            </div>

            <div class="mb-4">
                <label for="description" class="form-label">Detailed Description</label>
                <textarea class="form-control" id="description" name="description" rows="8" required th:text="${report.description}"></textarea>
            </div>

            <div class="d-flex justify-content-between">
                <a th:href="@{/intern/report/history}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary" style="background: var(--brand-green); border-color: var(--brand-green);">Resubmit Report</button>
            </div>
        </form>
    </div>
</body>
</html>
