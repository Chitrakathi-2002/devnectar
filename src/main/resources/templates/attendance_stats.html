<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Attendance Analytics | CloudNex</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .filter-nexus-analytics {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 3rem;
            margin-bottom: 3rem;
            box-shadow: var(--shadow-lg);
        }

        /* Choices.js Customization */
        .choices__inner {
            background: rgba(0, 0, 0, 0.05) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 14px !important;
            color: var(--text-primary) !important;
            padding: 0.8rem 1.25rem !important;
            min-height: 56px !important;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        .matrix-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }

        .matrix-table th {
            padding: 1.5rem 0.75rem;
            background: rgba(0,0,0,0.05);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.7rem;
        }

        .matrix-table td {
            padding: 1.25rem 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .sticky-col {
            position: sticky;
            left: 0;
            z-index: 100 !important;
            background: var(--bg-surface) !important;
            border-right: 2px solid var(--border-color) !important;
            box-shadow: 10px 0 30px -15px rgba(0,0,0,0.5);
        }

        .matrix-status-box {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: inline-block;
            transition: all 0.3s;
        }

        .status-PRESENT { background: var(--brand-green); box-shadow: 0 0 10px var(--brand-glow); }
        .status-ABSENT { background: var(--danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }

        .legend-node {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem 2.5rem;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border-color);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .identity-node-mini {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .node-avatar-mini {
            width: 42px; height: 42px; border-radius: 14px;
            background: linear-gradient(135deg, var(--brand-green) 0%, #059669 100%);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: white;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        /* Visible Export Buttons */
        .btn-export {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .btn-export:hover { 
            background: var(--brand-green);
            color: white;
            border-color: var(--brand-green);
            transform: translateY(-2px);
        }

        .btn-export-pdf:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        .summary-col {
            min-width: 80px;
            font-weight: 800;
            text-align: center;
            border-left: 1px solid var(--border-color);
        }

        .label-micro {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('stats')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/header :: header}" 
             th:with="pageTitle=${isAdmin ? 'Workforce Intelligence Matrix' : 'Contribution Analytics'}, 
                      pageSubtitle='Advanced behavioral assessment and monthly temporal analysis'"></div>

        <div class="dashboard-content">
            <!-- Analytics Filter Node (Admin Only) -->
            <div th:if="${isAdmin}" class="filter-nexus-analytics">
                <form id="matrixFilterForm" method="get" th:action="@{/admin/attendance/stats}" style="display: flex; gap: 2.5rem; align-items: flex-end; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 280px;">
                        <label class="label-micro">Temporal Cycle (Month)</label>
                        <select name="month" id="monthSelect">
                            <option th:each="m : ${#numbers.sequence(1, 12)}" 
                                    th:value="${m}" 
                                    th:text="${T(java.time.Month).of(m).name()}"
                                    th:selected="${m == selectedMonth}"></option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 200px;">
                        <label class="label-micro">Temporal Phase (Year)</label>
                        <select name="year" id="yearSelect">
                            <option th:each="y : ${#numbers.sequence(2024, 2030)}" 
                                    th:value="${y}" 
                                    th:text="${y}"
                                    th:selected="${y == selectedYear}"></option>
                        </select>
                    </div>
                    <div style="flex: 0 0 280px;">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sync-alt"></i> UPDATE MATRIX DATA
                        </button>
                    </div>
                </form>
            </div>

            <!-- Matrix Visual Layer -->
            <div class="card p-0" style="padding: 0 !important; overflow: visible;">
                <!-- Header Panel -->
                <div class="d-flex justify-content-between align-items-center p-5 flex-wrap gap-4" style="background: rgba(0,0,0,0.1); border-bottom: 1px solid var(--border-color);">
                    <div class="d-flex align-items-center gap-4">
                        <div style="width: 56px; height: 56px; background: rgba(16, 185, 129, 0.1); color: var(--brand-green); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                            <i class="fas fa-microchip"></i>
                        </div>
                        <div>
                            <h2 style="font-size: 1.75rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em; margin: 0;" th:text="${isAdmin ? 'Workforce Behavioral Matrix' : 'Attendance Analytics'}">Matrix</h2>
                            <p style="color: var(--brand-green); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.25rem;" th:text="${monthName + ' ' + selectedYear}">Cycle Identification</p>
                        </div>
                    </div>
                    
                    <div th:if="${isAdmin}" class="d-flex gap-3">
                        <a th:href="@{/admin/attendance/export/excel(month=${selectedMonth}, year=${selectedYear})}" class="btn btn-export">
                            <i class="fas fa-file-excel"></i> EXCEL DISPATCH
                        </a>
                        <a th:href="@{/admin/attendance/export/pdf(month=${selectedMonth}, year=${selectedYear})}" class="btn btn-export btn-export-pdf">
                            <i class="fas fa-file-pdf"></i> PDF EXPORT
                        </a>
                        <a th:href="@{/admin/attendance/all(month=${selectedMonth}, year=${selectedYear})}" class="btn btn-primary px-5">
                            DETAILED SYSTEM LOGS
                        </a>
                    </div>
                </div>

                <!-- Legend Node -->
                <div class="legend-node">
                    <div class="legend-item">
                        <div class="matrix-status-box status-PRESENT"></div>
                        <span>Present Cycle</span>
                    </div>
                    <div class="legend-item">
                        <div class="matrix-status-box status-ABSENT"></div>
                        <span>Absent / Gap Detected</span>
                    </div>
                    <div class="legend-item">
                        <span style="color: var(--text-secondary); opacity: 0.3; font-weight: 800; font-size: 0.9rem;">H</span>
                        <span>Holiday / Weekend</span>
                    </div>
                </div>
                
                <div th:if="${isAdmin}" class="table-responsive" style="overflow-x: auto;">
                    <table class="matrix-table">
                        <thead>
                            <tr>
                                <th rowspan="2" class="sticky-col" style="min-width: 280px; text-align: left; padding-left: 2.5rem;">Staff Node Identification</th>
                                <th th:colspan="${daysInMonth}" class="text-center" style="background: rgba(0,0,0,0.15); border-left: 2px solid var(--border-color);">Daily Synchronization Stream</th>
                                <th colspan="3" class="text-center" style="background: rgba(16, 185, 129, 0.05); border-left: 2px solid var(--border-color);">Monthly Summary</th>
                            </tr>
                            <tr>
                                <th th:each="day : ${#numbers.sequence(1, daysInMonth)}" 
                                    th:text="${day}" 
                                    class="text-center" 
                                    style="min-width: 36px;"
                                    th:styleappend="${day == todayDay} ? 'background: var(--brand-green); color: white; border: none; box-shadow: 0 0 20px var(--brand-glow);' : ''">1</th>
                                <th class="summary-col" style="color: var(--brand-green); min-width: 100px;">PRESENT</th>
                                <th class="summary-col" style="color: var(--danger); min-width: 100px;">ABSENT</th>
                                <th class="summary-col" style="min-width: 120px;">EFFICIENCY</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="row : ${matrixRows}">
                                <td class="sticky-col" style="padding-left: 2.5rem;">
                                    <div class="identity-node-mini">
                                        <div class="node-avatar-mini" th:text="${#strings.substring(row.fullName,0,1)}">U</div>
                                        <div class="d-flex flex-column">
                                            <span style="font-weight: 800; color: var(--text-primary); font-size: 1rem;" th:text="${row.fullName}">Name</span>
                                            <span th:if="${row.presentToday}" class="badge badge-success" style="font-size: 0.6rem; margin-top: 4px;">LIVE NODE</span>
                                        </div>
                                    </div>
                                </td>
                                <td th:each="day : ${#numbers.sequence(1, daysInMonth)}" 
                                    class="text-center" 
                                    th:with="status=${row.dailyStatus.get(day)}">
                                    <span th:if="${day >= row.registrationDay}">
                                        <div th:if="${status == 'PRESENT'}" class="matrix-status-box status-PRESENT" data-bs-toggle="tooltip" title="Cycle Locked"></div>
                                        <div th:if="${status == 'ABSENT'}" class="matrix-status-box status-ABSENT" data-bs-toggle="tooltip" title="Gap Detected"></div>
                                        <span th:if="${status == 'SUNDAY'}" style="color: var(--text-secondary); opacity: 0.3; font-weight: 800; font-size: 0.75rem;">H</span>
                                        <span th:if="${status == 'PENDING' || status == null}" style="color: var(--border-color); opacity: 0.2;">.</span>
                                    </span>
                                </td>
                                <td th:text="${row.presentCount}" class="summary-col" style="color: var(--brand-green); font-size: 1rem;">0</td>
                                <td th:text="${row.absentCount}" class="summary-col" style="color: var(--danger); font-size: 1rem;">0</td>
                                <td class="summary-col">
                                    <span th:text="${#numbers.formatDecimal(row.attendanceRate, 1, 0) + '%'}"
                                          class="badge"
                                          style="font-size: 0.75rem; min-width: 60px; padding: 0.5rem;"
                                          th:classappend="${row.attendanceRate >= 80 ? 'badge-success' : (row.attendanceRate >= 50 ? 'badge-warning' : 'badge-danger')}">0%</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div th:unless="${isAdmin}" style="height: 500px; padding: 4rem;">
                    <canvas id="attendanceChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const choiceOptions = {
                searchEnabled: false,
                itemSelectText: '',
                classNames: {
                    containerInner: 'choices__inner',
                    listDropdown: 'choices__list--dropdown',
                }
            };

            if (document.getElementById('monthSelect')) new Choices('#monthSelect', choiceOptions);
            if (document.getElementById('yearSelect')) new Choices('#yearSelect', choiceOptions);

            const isAdmin = /*[[${isAdmin}]]*/ false;
            if (!isAdmin) {
                const ctx = document.getElementById('attendanceChart')?.getContext('2d');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: /*[[${chartLabels}]]*/ [],
                            datasets: [{
                                label: 'Synch Density',
                                data: /*[[${chartData}]]*/ [],
                                backgroundColor: 'rgba(16, 185, 129, 0.2)',
                                borderColor: '#10b981',
                                borderWidth: 3,
                                borderRadius: 12
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: { 
                                    beginAtZero: true, 
                                    max: 1.1, 
                                    ticks: { color: '#64748b', stepSize: 1, callback: v => v === 1 ? 'LOCKED' : (v === 0 ? 'VOID' : '') },
                                    grid: { color: 'rgba(255,255,255,0.03)' }
                                },
                                x: { ticks: { color: '#64748b', font: { weight: '700' } }, grid: { display : false } }
                            },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
